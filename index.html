void reverse(char* str) {
    int len = strlen(str);
    char temp;
    char* p1 = str;
    char* p2 = str + len - 1;
    while (p1 < p2) {
        temp = *p1; *p1 = *p2; *p2 = temp;
        p1++; p2--;
    }
}

int main(int argc, char* argv[]) {
    char str[100] = "ABCDEFGH";
    reverse(str);
    int len = strlen(str);

      {type:"code",q:"아래 Java 코드의 실행 순서를 작성하시오. (중복 번호 없이)",code:`class Parent {

      {type:"code",q:"다음 C언어 코드의 출력 값을 작성하시오.",code:`#include <stdio.h>
typedef struct { int accNum; double bal; } BankAcc;

double sim_pow(double base, int year) {
    double r = 1.0;
    for (int i = 0; i < year; i++) r *= base;
    return r;
}
void initAcc(BankAcc* acc, int x, double y) { acc->accNum=x; acc->bal=y; }
void xxx(BankAcc* acc, double* en) {
    if (*en > 0 && *en < acc->bal) acc->bal -= *en;
    else acc->bal += *en;
}
void yyy(BankAcc* acc) { acc->bal *= sim_pow(1.1, 3); }

int main() {
    BankAcc myAcc;
    initAcc(&myAcc, 9981, 2200.0);
    double amount = 100.0;
    xxx(&myAcc, &amount);
    yyy(&myAcc);
    printf("%d and %.2f", myAcc.accNum, myAcc.bal);
    return 0;
}`,lang:"c",a:"9981 and 2795.10"},

int main() {
    char* p = "It is 8";
    char result[100];
    int i;
    for (i = 0; p[i] != '\0'; i++) {
        if (isupper(p[i]))       result[i] = (p[i]-'A'+5)%25+'A';
        else if (islower(p[i]))  result[i] = (p[i]-'a'+10)%26+'a';
        else if (isdigit(p[i]))  result[i] = (p[i]-'0'+3)%10+'0';
        else                     result[i] = p[i];
    }
    result[i] = '\0';
    printf("%s\n", result);
    return 0;
}`,lang:"c",a:"Nd sc 1"},

interface Number { int sum(int[] a, boolean odd); }
class ODDNumber implements Number {
    public int sum(int[] a, boolean odd) {
        int result = 0;
        for (int i=0; i<a.length; i++)

#include <stdlib.h>
typedef struct Data { int value; struct Data* next; } Data;

Data* insert(Data* head, int value) {
    Data* n=(Data*)malloc(sizeof(Data));
    n->value=value; n->next=head; return n;
}
Data* reconnect(Data* head, int value) {
    if (!head||head->value==value) return head;
    Data *prev=NULL,*curr=head;
    while (curr&&curr->value!=value){prev=curr;curr=curr->next;}
    if (curr&&prev){prev->next=curr->next;curr->next=head;head=curr;}
    return head;
}
int main() {
    Data *head=NULL,*curr;
    for (int i=1;i<=5;i++) head=insert(head,i);
    head=reconnect(head,3);
    for (curr=head;curr;curr=curr->next) printf("%d",curr->value);
    return 0;
}`,lang:"c",a:"35421"},

let curYear="2024",curRound="1회",curFilter="all";

function buildTabs(){
  const yt=document.getElementById("yearTabs");
  ["2024","2025"].forEach(y=>{
    const b=document.createElement("button");
    b.className="tab-y"+(y===curYear?" active":"");
    b.textContent=y+"년";
    b.onclick=()=>{curYear=y;curRound=Object.keys(DATA[y])[0];buildRoundTabs();render();syncYearTabs();};
    yt.appendChild(b);
  });
}
function syncYearTabs(){
  document.querySelectorAll(".tab-y").forEach(b=>b.classList.toggle("active",b.textContent===curYear+"년"));
}
function buildRoundTabs(){
  const rt=document.getElementById("roundTabs");
  rt.innerHTML="";
  Object.keys(DATA[curYear]).forEach(r=>{
    const b=document.createElement("button");
    b.className="tab-r"+(r===curRound?" active":"");
    b.textContent=r;
    b.onclick=()=>{curRound=r;render();document.querySelectorAll(".tab-r").forEach(x=>x.classList.toggle("active",x.textContent===r));};
    rt.appendChild(b);
  });
}
function setFilter(el,type){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  curFilter=type;render();
}
function highlight(code,lang){
  let s=code.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  if(lang==="sql"){
    s=s.replace(/\b(SELECT|FROM|WHERE|AND|OR|IN|JOIN|ON|GROUP BY|HAVING|COUNT|INSERT|INTO|UPDATE|SET|VALUES|AS|NOT)\b/gi,m=>`<span class="syn-kw">${m}</span>`);
    s=s.replace(/'([^']*)'/g,`<span class="syn-str">'$1'</span>`);
    s=s.replace(/--[^\n]*/g,m=>`<span class="syn-cmt">${m}</span>`);
    return s;
  }
  if(lang==="python"){
    s=s.replace(/\b(def|class|return|for|while|if|elif|else|in|not|and|or|True|False|None|import|from|as|with|lambda|range|print|len|sum|set|type|enumerate)\b/g,m=>`<span class="syn-kw">${m}</span>`);
    s=s.replace(/"([^"]*)"|'([^']*)'/g,m=>`<span class="syn-str">${m}</span>`);
    s=s.replace(/#[^\n]*/g,m=>`<span class="syn-cmt">${m}</span>`);
    s=s.replace(/\b(\d+)\b/g,`<span class="syn-num">$1</span>`);
    return s;
  }
  const kws=lang==="java"
    ?["public","private","static","class","interface","extends","implements","new","return","void","int","String","boolean","char","double","null","true","false","if","else","for","while","switch","case","break","default","try","catch","finally","throws","throw","this","super","enum","final","abstract","override"]
    :["int","char","double","float","void","if","else","for","while","return","struct","typedef","static","NULL","printf","scanf","malloc","free","sizeof","include","define"];
  const kwRe=new RegExp(`\\b(${kws.join("|")})\\b`,"g");
  s=s.replace(kwRe,m=>`<span class="syn-kw">${m}</span>`);
  s=s.replace(/"([^"]*)"/g,`<span class="syn-str">"$1"</span>`);
  s=s.replace(/'(.)'/g,`<span class="syn-str">'$1'</span>`);
  s=s.replace(/\/\/[^\n]*/g,m=>`<span class="syn-cmt">${m}</span>`);
  s=s.replace(/#[^\n]*/g,m=>`<span class="syn-pp">${m}</span>`);
  s=s.replace(/\b(\d+[uUlLfF]*)\b/g,`<span class="syn-num">$1</span>`);
  return s;
}
function badgeClass(t){return{code:"badge-code",sql:"badge-sql",concept:"badge-concept",network:"badge-network",db:"badge-db"}[t]||"badge-concept";}
function badgeLabel(t){return{code:"코드",sql:"SQL",concept:"개념",network:"네트워크",db:"DB"}[t]||t;}
function hl(text,kw){
  if(!kw)return text;
  const re=new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})`,"gi");
  return text.replace(re,`<span class="kw">$1</span>`);
}
function render(){
  const kw=document.getElementById("searchInput").value.trim().toLowerCase();
  const questions=DATA[curYear][curRound];
  const filtered=questions.filter((q,i)=>{
    if(curFilter!=="all"&&q.type!==curFilter)return false;
    if(kw&&!q.q.toLowerCase().includes(kw)&&!(q.code||"").toLowerCase().includes(kw)&&!q.a.toLowerCase().includes(kw))return false;
    return true;
  });
  document.getElementById("counter").textContent=`${filtered.length}문제`;
  const list=document.getElementById("qList");
  if(!filtered.length){list.innerHTML=`<div class="no-results">검색 결과가 없습니다.</div>`;return;}
  list.innerHTML=filtered.map((q,idx)=>{
    const origIdx=questions.indexOf(q)+1;
    const codeAreaHtml=q.code?`
      <div class="code-area" id="code-${idx}">
        <div class="code-block">
          <span class="code-lang">${q.lang||""}</span>
          <button class="copy-btn" onclick="copyCode(this)">복사</button>
          <pre>${highlight(q.code,q.lang||"")}</pre>
        </div>
      </div>`:"";
    const qText=kw?hl(q.q.replace(/\n/g,"<br>"),kw):q.q.replace(/\n/g,"<br>");
    const typeIcon={code:"💻",sql:"🗄️",concept:"📚",network:"🌐",db:"💾"}[q.type]||"📝";
    const codeToggleBtn=q.code?`<button class="control-btn code-toggle-btn" id="code-btn-${idx}" onclick="toggleCode(${idx})">💻 코드보기</button>`:"";
    return `
    <div class="q-card" id="card-${idx}">
      <div class="q-meta-row">
        <div class="q-num">${origIdx}</div>
        <div class="q-badges">
          <span class="q-type-badge ${badgeClass(q.type)}">${typeIcon} ${badgeLabel(q.type)}</span>
        </div>
        <div class="q-year-info">${curYear}년 ${curRound}</div>
      </div>
      <div class="q-content-box ${q.code?'has-code':''}">
        <div class="q-text">${qText}</div>
      </div>
      ${codeAreaHtml}
      <div class="q-controls">
        ${codeToggleBtn}
        <button class="control-btn answer-btn" id="ans-btn-${idx}" onclick="toggleAnswer(${idx})">✅ 정답보기</button>
      </div>
      <div class="answer-area" id="ans-${idx}">
        <span class="ans-label">정답</span>
        <span class="ans-text">${q.a.replace(/\n/g,"<br>")}</span>
      </div>
    </div>`;
  }).join("");
}
function toggleCode(idx){
  const codeArea=document.getElementById("code-"+idx);
  const codeBtn=document.getElementById("code-btn-"+idx);
  if(!codeArea||!codeBtn)return;
  const open=codeArea.classList.toggle("open");
  codeBtn.classList.toggle("active",open);
  codeBtn.innerHTML=open?"🔽 코드닫기":"💻 코드보기";
}
function toggleAnswer(idx){
  const ansArea=document.getElementById("ans-"+idx);
  const ansBtn=document.getElementById("ans-btn-"+idx);
  const open=ansArea.classList.toggle("open");
  ansBtn.classList.toggle("open",open);
  ansBtn.innerHTML=open?"❌ 정답닫기":"✅ 정답보기";
}
function copyCode(btn){
  const pre=btn.nextElementSibling;
  navigator.clipboard.writeText(pre.innerText).then(()=>{
    btn.textContent="복사됨";
    setTimeout(()=>btn.textContent="복사",1200);
  });
}
buildTabs();buildRoundTabs();render();
</script>
